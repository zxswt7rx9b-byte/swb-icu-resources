<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWB ICU — New Doctor Induction Guide</title>
<style>
/* ================================================================
   ICU INDUCTION GUIDE — STYLE
   To edit content: find the GUIDE_SECTIONS array in the <script>
   To add a section: add a new object to that array
   ================================================================ */
:root {
  --orange:  #F49001;
  --magenta: #BF0278;
  --cyan:    #07A6D5;
  --purple:  #44247C;
  --blue:    #0067A4;
  --light:   #f7f8fc;
  --text:    #1e1e2e;
  --muted:   #6b7280;
  --sidebar-w: 270px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: var(--light);
  color: var(--text);
  min-height: 100vh;
}

/* ---- Sidebar ---- */
#sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--purple);
  color: #fff;
  overflow-y: auto;
  z-index: 200;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s ease;
}

.sidebar-head {
  padding: 24px 20px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.12);
  flex-shrink: 0;
}

.sidebar-brand {
  font-size: 20px;
  font-weight: 800;
  color: var(--orange);
  letter-spacing: -0.5px;
  line-height: 1;
}

.sidebar-tagline {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  margin-top: 5px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.nav-list { padding: 12px 0; flex: 1; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  color: rgba(255,255,255,0.72);
  font-size: 13.5px;
  text-decoration: none;
  transition: background 0.15s, color 0.15s;
  border-left: 3px solid transparent;
}

.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active {
  background: rgba(255,255,255,0.12);
  color: #fff;
  border-left-color: var(--orange);
}

.nav-item .ni { font-size: 15px; width: 22px; text-align: center; flex-shrink: 0; }

.sidebar-foot {
  padding: 14px 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  flex-shrink: 0;
}

/* ---- Main ---- */
#main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  padding-bottom: 120px;
}

#topbar {
  background: #fff;
  border-bottom: 3px solid var(--orange);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}

#menu-toggle {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 22px;
  color: var(--purple);
  padding: 2px 6px;
}

.topbar-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--purple);
  flex: 1;
}

.topbar-voice {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--muted);
}

.topbar-voice select {
  font-size: 13px;
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 4px 8px;
  color: var(--text);
  background: #fff;
  cursor: pointer;
}

/* ---- Content ---- */
#content { padding: 32px; max-width: 860px; }

/* Hero */
.hero {
  background: linear-gradient(135deg, var(--purple) 0%, var(--blue) 100%);
  border-radius: 16px;
  padding: 44px 48px;
  color: #fff;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 200px; height: 200px;
  background: rgba(255,255,255,0.05);
  border-radius: 50%;
}

.hero h1 {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 8px;
}

.hero .hero-sub {
  font-size: 17px;
  opacity: 0.8;
  margin-bottom: 20px;
}

.hero .hero-meta {
  font-size: 13px;
  opacity: 0.55;
  margin-bottom: 28px;
}

.btn-guide {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--orange);
  color: #fff;
  padding: 12px 22px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.btn-guide:hover { background: #d97f00; transform: translateY(-1px); }

.btn-guide + .btn-guide {
  background: rgba(255,255,255,0.15);
  margin-left: 10px;
}

.btn-guide + .btn-guide:hover { background: rgba(255,255,255,0.25); }

/* Section cards */
.section-card {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 24px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06), 0 3px 16px rgba(0,0,0,0.03);
  scroll-margin-top: 78px;
}

.section-card-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 22px;
}

.sc-icon {
  font-size: 22px;
  width: 46px; height: 46px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px;
  background: rgba(255,255,255,0.18);
  flex-shrink: 0;
}

.sc-titles { flex: 1; min-width: 0; }

.sc-title {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
}

.sc-tag {
  font-size: 10.5px;
  font-weight: 600;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 0.9px;
  margin-top: 3px;
}

.sc-play {
  flex-shrink: 0;
  background: rgba(255,255,255,0.18);
  border: none;
  color: #fff;
  width: 38px; height: 38px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}

.sc-play:hover { background: rgba(255,255,255,0.32); }
.sc-play.active { background: rgba(255,255,255,0.4); }

.section-card-body {
  padding: 22px 24px;
}

.section-card-body p { margin-bottom: 12px; line-height: 1.75; font-size: 14.5px; }
.section-card-body p:last-child { margin-bottom: 0; }

.section-card-body h3 {
  font-size: 13.5px;
  font-weight: 700;
  color: var(--purple);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin: 20px 0 10px;
}

.section-card-body ul {
  margin: 0 0 12px 18px;
}

.section-card-body ul li {
  margin-bottom: 7px;
  font-size: 14.5px;
  line-height: 1.65;
}

.section-card-body .callout {
  border-radius: 8px;
  padding: 14px 16px;
  margin: 14px 0;
  font-size: 14px;
  line-height: 1.65;
}

.callout-info { background: #eef6fd; border-left: 4px solid var(--cyan); }
.callout-warn { background: #fff4e8; border-left: 4px solid var(--orange); }
.callout-key  { background: #f3eeff; border-left: 4px solid var(--purple); }
.callout-imp  { background: #fdeef5; border-left: 4px solid var(--magenta); }

.callout strong { display: block; margin-bottom: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.6; }

/* Role grid */
.role-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin: 14px 0;
}

.role-card {
  padding: 14px 12px;
  border-radius: 10px;
  text-align: center;
  border: 1px solid rgba(0,0,0,0.07);
}

.role-card .role-name {
  font-size: 13px;
  font-weight: 700;
  margin-top: 6px;
  color: var(--text);
}

.role-card .role-desc {
  font-size: 11.5px;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.45;
}

/* Day/Night timeline */
.timeline {
  display: flex;
  gap: 4px;
  margin: 14px 0;
  border-radius: 10px;
  overflow: hidden;
  height: 52px;
}

.tl-block {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  flex-direction: column;
  gap: 2px;
}

.tl-block small { font-weight: 400; opacity: 0.75; font-size: 10px; }

/* Narration bar */
#narration-bar {
  position: fixed;
  bottom: 0;
  left: var(--sidebar-w);
  right: 0;
  background: #14112a;
  border-top: 2px solid var(--purple);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  z-index: 300;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}

#narration-bar.visible { transform: translateY(0); }

.nb-section {
  font-size: 11px;
  font-weight: 700;
  color: var(--orange);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  white-space: nowrap;
  flex-shrink: 0;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nb-subtitle {
  flex: 1;
  font-size: 14px;
  color: rgba(255,255,255,0.88);
  line-height: 1.4;
  min-width: 0;
}

.nb-subtitle .nb-done { color: rgba(255,255,255,0.35); }
.nb-subtitle .nb-now  { color: #fff; font-weight: 600; }

.nb-stop {
  flex-shrink: 0;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: background 0.15s;
}

.nb-stop:hover { background: rgba(255,255,255,0.15); color: #fff; }

@keyframes spin { to { transform: rotate(360deg); } }

/* Mobile */
@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #sidebar-overlay { display: block !important; }
  #main { margin-left: 0; }
  #narration-bar { left: 0; }
  #menu-toggle { display: block; }
  #content { padding: 16px; }
  .hero { padding: 28px 24px; }
  .hero h1 { font-size: 22px; }
}

#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 150;
}
</style>
</head>
<body>

<!-- Mobile overlay -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-brand">SWB ICU</div>
    <div class="sidebar-tagline">New Doctor Induction</div>
  </div>
  <div class="nav-list" id="nav-list">
    <!-- Populated by JS -->
  </div>
  <div class="sidebar-foot">
    Sandwell &amp; West Birmingham NHS Trust
  </div>
</nav>

<!-- Main content -->
<div id="main">
  <div id="topbar">
    <button id="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
    <div class="topbar-title">ICU Induction Guide</div>
    <div class="topbar-voice">
      <span id="voice-label">Voice:</span>
      <select id="voice-select">
        <option value="">Loading voices…</option>
      </select>
    </div>
  </div>

  <div id="content">
    <!-- Hero -->
    <div class="hero" id="section-welcome">
      <h1>Working in SWB ICU</h1>
      <div class="hero-sub">Medical Team — Structure &amp; Ways of Working</div>
      <div class="hero-meta">Presented by Jon Hulme &bull; Sandwell &amp; West Birmingham NHS Trust</div>
      <button class="btn-guide" onclick="playAllSections()">&#9654; Start narrated guide</button>
      <button class="btn-guide" id="hero-play-btn" onclick="playSectionById('welcome')">&#9654; Narrate this intro</button>
    </div>

    <!-- Section cards rendered by JS -->
    <div id="sections-container"></div>
  </div>
</div>

<!-- Narration bar -->
<div id="narration-bar">
  <div class="nb-section" id="nb-section-label">—</div>
  <div class="nb-subtitle" id="nb-subtitle">Initialising voice model…</div>
  <button class="nb-stop" onclick="stopNarration()">&#9646;&#9646; Stop</button>
</div>

<!-- TTS status toast -->
<div id="tts-toast" style="display:none;position:fixed;top:72px;right:24px;background:#14112a;color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;z-index:400;border-left:4px solid var(--orange);max-width:300px;line-height:1.5;box-shadow:0 4px 20px rgba(0,0,0,0.3)"></div>


<script type="module">
/* ================================================================
   GUIDE CONTENT
   ----------------------------------------------------------------
   Each section has:
     id       - unique slug (used for navigation anchors)
     title    - section heading
     tag      - small label shown in header
     icon     - emoji icon
     color    - one of: 'blue','cyan','purple','orange','magenta'
     content  - HTML string for the body
     narration - text that will be spoken aloud (plain text only)
   ================================================================ */

const GUIDE_SECTIONS = [
  {
    id: 'welcome',
    title: 'Welcome to SWB ICU',
    tag: 'Introduction',
    icon: '🏥',
    color: 'purple',
    content: `
      <p>Welcome to Sandwell and West Birmingham ICU. This guide walks you through how our department works, what we expect from everyone in the medical team, and how to get the best out of your time here.</p>
      <p>Use the sidebar to navigate between sections. Each section has a play button so you can listen to a narrated explanation while you read. Or press <strong>Start narrated guide</strong> at the top to go through everything in sequence.</p>
      <div class="callout callout-key">
        <strong>Contents</strong>
        Team structure · Ward rounds · Safety briefs · Handover · Education · Research · Incidents · Prescriptions · Discharge · Communication · Help &amp; support · Uniform · Get involved
      </div>
    `,
    narration: `Welcome to SWB ICU. This guide covers how the medical team is organised, what we expect from you day to day, and how to get the most out of your time here. Use the sidebar to jump to any section, or press Start to go through everything in order. It should take around ten minutes to go through the whole thing.`
  },

  {
    id: 'team-structure',
    title: 'ICU Team Structure',
    tag: 'How we\'re organised',
    icon: '👥',
    color: 'blue',
    content: `
      <p>The SWB ICU medical team is made up of four core roles working closely alongside senior nursing staff.</p>
      <div class="role-grid">
        <div class="role-card" style="background:#eef4fb;">
          <div style="font-size:26px">⚕️</div>
          <div class="role-name" style="color:var(--blue)">Consultant</div>
          <div class="role-desc">Overall clinical lead. Present on unit during the day. Leads ward rounds, coordinates care, provides supervision.</div>
        </div>
        <div class="role-card" style="background:#edf9fb;">
          <div style="font-size:26px">🩺</div>
          <div class="role-name" style="color:var(--cyan)">Registrar (SpR)</div>
          <div class="role-desc">Day-to-day clinical running of the unit. Leads rounds with consultant input. On-site overnight.</div>
        </div>
        <div class="role-card" style="background:#f5f0ff;">
          <div style="font-size:26px">👨‍⚕️</div>
          <div class="role-name" style="color:var(--purple)">SHO / Fellow</div>
          <div class="role-desc">Patient preparation, procedures, documentation. Supervised by registrar and consultant. Supported to develop ICU skills.</div>
        </div>
        <div class="role-card" style="background:#fff4e8;">
          <div style="font-size:26px">🏅</div>
          <div class="role-name" style="color:var(--orange)">ACCP</div>
          <div class="role-desc">Advanced Critical Care Practitioner. Highly skilled non-medical clinicians working alongside the medical team in all aspects of care.</div>
        </div>
        <div class="role-card" style="background:#fdeef5;">
          <div style="font-size:26px">👩‍⚕️</div>
          <div class="role-name" style="color:var(--magenta)">Senior Nurse</div>
          <div class="role-desc">Shift coordinator. Central to patient safety, escalation, and day-to-day unit management.</div>
        </div>
      </div>
      <div class="callout callout-info">
        <strong>Note</strong>
        Job role cards for each position are available in the ICU — these give a one-page summary of responsibilities per shift.
      </div>
    `,
    narration: `The medical team has four core roles. Consultants lead the unit and are physically present during the day — they run ward rounds, coordinate care, and provide supervision. Registrars run the day-to-day clinical work and are on-site overnight. SHOs support the team and develop their ICU skills under supervision. And ACCPs — Advanced Critical Care Practitioners — are highly skilled non-medical clinicians who work alongside doctors across all aspects of care, including procedures and prescribing.`
  },

  {
    id: 'daytime',
    title: 'Daytime Structure',
    tag: 'Working hours',
    icon: '🌤',
    color: 'cyan',
    content: `
      <p>During the day the unit runs with a full team. Consultants are physically present and leading the clinical work.</p>
      <div class="timeline">
        <div class="tl-block" style="background:var(--blue);flex:2">Morning<small>Handover + ward round</small></div>
        <div class="tl-block" style="background:var(--cyan);flex:3">Daytime<small>Business rounds, procedures, admissions</small></div>
        <div class="tl-block" style="background:var(--purple);flex:1">Evening handover<small>Day → Night</small></div>
      </div>
      <h3>Key points</h3>
      <ul>
        <li>Consultant presence on the unit throughout the day — use them early.</li>
        <li>Multiple registrars covering different areas depending on unit size and activity.</li>
        <li>SHOs and ACCPs are allocated to bed areas each shift.</li>
        <li>Check the daily allocation board to know your area and patients.</li>
        <li>Daytime is also when education sessions, procedures, and family meetings happen — plan ahead.</li>
      </ul>
      <div class="callout callout-info">
        <strong>Getting started</strong>
        Arrive before handover. Know which area you're covering. Review your patients on EPR before the ward round.
      </div>
    `,
    narration: `During the day the unit runs with a full team — consultants present, registrars covering clinical areas, SHOs and ACCPs allocated to bed zones. Check the daily allocation board at the start of your shift to know which area you're covering and who your patients are. Arrive before handover and review your patients on EPR so you're ready to go. Daytime is also when education, family meetings, and elective procedures happen, so plan ahead.`
  },

  {
    id: 'ward-rounds',
    title: 'Ward Rounds',
    tag: 'Daily clinical work',
    icon: '📋',
    color: 'blue',
    content: `
      <p>Ward rounds are central to how we work. There are two types: the main consultant-led ward round, and the business round — a focused walkaround between rounds to review progress and update actions.</p>
      <h3>Your responsibilities for each round</h3>
      <ul>
        <li><strong>Shared prep.</strong> Everyone contributes — don't wait to be asked. Prep patients as you arrive on shift.</li>
        <li><strong>Updated EPR.</strong> Records should be current at the time of the round, not written afterwards.</li>
        <li><strong>Contemporary active problems.</strong> Know the live problems, not just a historical list.</li>
        <li><strong>Action list.</strong> Have a clear action list ready to present — not just a passive summary.</li>
        <li><strong>Present your patient.</strong> You are expected to know and lead the presentation.</li>
        <li><strong>Use the EPR worklist.</strong> This is the live version of actions — keep it updated throughout the day.</li>
      </ul>
      <h3>On the round</h3>
      <ul>
        <li>Pay attention to all patients, not just ones you have prepped.</li>
        <li>Engage with the bedside nurse during each patient review.</li>
        <li>Do not use your phone during the ward round.</li>
      </ul>
      <div class="callout callout-warn">
        <strong>Important</strong>
        Examine the patient. Discuss with the bedside nurse. Collate and summarise the information before presenting. Do not present from memory alone.
      </div>
    `,
    narration: `Ward rounds are central to how we work, and there are two types: the main consultant-led round, and the business round — a focused walkaround during the day to review progress and update actions. For both, you're expected to prep your patients beforehand: updated EPR, contemporary active problems listed, and a clear action plan ready. You present your patients — not just summarise them — and you use the EPR worklist to keep actions live throughout the shift. Pay attention to all patients on the round, not just your own, and please don't use your phone.`
  },

  {
    id: 'patient-records',
    title: 'Patient Records',
    tag: 'Documentation',
    icon: '📝',
    color: 'purple',
    content: `
      <p>Good documentation is a safety imperative, not an administrative task. Every entry in the patient record carries your name — make sure it reflects high standards.</p>
      <h3>Core principles</h3>
      <ul>
        <li><strong>Accurate</strong> — reflects the clinical reality of the patient at that time.</li>
        <li><strong>Contemporaneous</strong> — written at the time, or as close to it as possible.</li>
        <li><strong>Succinct</strong> — focused and purposeful. Avoid repetition and vague phrasing.</li>
      </ul>
      <h3>Before documenting</h3>
      <ul>
        <li>Examine the patient yourself.</li>
        <li>Discuss the patient's status with the bedside nurse.</li>
        <li>Collate the relevant information — investigations, trends, family communication.</li>
        <li>Then summarise clearly with your assessment and plan.</li>
      </ul>
      <div class="callout callout-key">
        <strong>Remember</strong>
        If it isn't documented, it didn't happen. Clear records protect the patient and protect you.
      </div>
    `,
    narration: `Good documentation is a safety requirement, not a paperwork exercise. Records need to be accurate, contemporaneous, and succinct — written at the time, not reconstructed later. Before documenting, examine the patient, talk to the bedside nurse, and collate the relevant information. Then summarise clearly with your assessment and plan. Clear records protect your patients and protect you.`
  },

  {
    id: 'out-of-hours',
    title: 'Out of Hours',
    tag: 'Night working',
    icon: '🌙',
    color: 'magenta',
    content: `
      <p>Overnight the unit runs with a reduced but focused medical team. The structure changes, but the standard of care does not.</p>
      <div class="timeline">
        <div class="tl-block" style="background:var(--purple);flex:1">Evening<small>Handover</small></div>
        <div class="tl-block" style="background:var(--magenta);flex:3">Night<small>Registrar on-site, ACCPs, SHOs</small></div>
        <div class="tl-block" style="background:var(--blue);flex:1">Morning<small>Handover</small></div>
      </div>
      <h3>Night team structure</h3>
      <ul>
        <li>A registrar is on-site throughout the night, supported by ACCPs and SHOs where rostered.</li>
        <li>Consultants are contactable by phone and will attend for significant clinical events.</li>
        <li>The baton phone is the central communication tool — covered in the Communication section.</li>
      </ul>
      <h3>Escalation at night</h3>

/* ================================================================
   COLOUR MAP
   ================================================================ */
const COLORS = {
  blue:    'var(--blue)',
  cyan:    'var(--cyan)',
  purple:  'var(--purple)',
  orange:  'var(--orange)',
  magenta: 'var(--magenta)'
};

/* ================================================================
   RENDER SECTIONS
   ================================================================ */
function renderSections() {
  const nav = document.getElementById('nav-list');
  const container = document.getElementById('sections-container');

  GUIDE_SECTIONS.forEach((sec, idx) => {
    const color = COLORS[sec.color] || COLORS.blue;

    // Nav item
    const a = document.createElement('a');
    a.className = 'nav-item';
    a.href = `#section-${sec.id}`;
    a.dataset.id = sec.id;
    a.innerHTML = `<span class="ni">${sec.icon}</span>${sec.title}`;
    a.addEventListener('click', e => {
      e.preventDefault();
      document.getElementById(`section-${sec.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      closeSidebar();
    });
    nav.appendChild(a);

    // Card
    const card = document.createElement('div');
    card.className = 'section-card';
    card.id = `section-${sec.id}`;
    card.innerHTML = `
      <div class="section-card-header" style="background:${color}">
        <div class="sc-icon">${sec.icon}</div>
        <div class="sc-titles">
          <div class="sc-title">${sec.title}</div>
          <div class="sc-tag">${sec.tag}</div>
        </div>
        <button class="sc-play" data-id="${sec.id}" title="Listen to narration" aria-label="Play narration">&#9654;</button>
      </div>
      <div class="section-card-body">${sec.content}</div>
    `;

    card.querySelector('.sc-play').addEventListener('click', () => playSectionById(sec.id));
    container.appendChild(card);
  });
}

/* ================================================================
   INTERSECTION OBSERVER — highlight active nav item
   ================================================================ */
function initScrollSpy() {
  const cards = document.querySelectorAll('.section-card');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id.replace('section-', '');
        document.querySelectorAll('.nav-item').forEach(n => {
          n.classList.toggle('active', n.dataset.id === id);
        });
      }
    });
  }, { rootMargin: '-60px 0px -60% 0px' });

  cards.forEach(c => observer.observe(c));
}

/* ================================================================
   WEB SPEECH API TTS
   Works in every modern browser with no download required.
   Voices are populated from whatever the browser/OS has installed.
   ================================================================ */

let stopRequested = false;
let availableVoices = [];

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showToast(msg, durationMs = 3000) {
  const t = document.getElementById('tts-toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.display = 'none'; }, durationMs);
}

/* Load voices — Chrome fires voiceschanged async, Safari is sync */
function loadVoices() {
  return new Promise(resolve => {
    const v = speechSynthesis.getVoices();
    if (v.length) { availableVoices = v; resolve(v); return; }
    speechSynthesis.addEventListener('voiceschanged', () => {
      availableVoices = speechSynthesis.getVoices();
      resolve(availableVoices);
    }, { once: true });
  });
}

/* Populate the voice selector with real browser voices */
async function populateVoiceSelect() {
  const voices = await loadVoices();
  const select = document.getElementById('voice-select');
  const english = voices.filter(v => v.lang.startsWith('en'));
  if (!english.length) return;

  select.innerHTML = '';
  // British first, then others
  const british = english.filter(v => v.lang === 'en-GB' || v.lang === 'en_GB');
  const others  = english.filter(v => v.lang !== 'en-GB' && v.lang !== 'en_GB');
  const ordered = [...british, ...others];

  ordered.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name;
    const flag = (v.lang === 'en-GB' || v.lang === 'en_GB') ? ' 🇬🇧' : '';
    opt.textContent = `${v.name}${flag}`;
    select.appendChild(opt);
  });

  // Auto-pick best British voice available
  const best = british.find(v => /daniel|arthur|oliver|george|kate|serena/i.test(v.name))
            || british[0]
            || ordered[0];
  if (best) select.value = best.name;
}

function getSelectedVoice() {
  const name = document.getElementById('voice-select').value;
  return availableVoices.find(v => v.name === name) || null;
}

/* Speak one sentence; resolves when finished */
function speakSentence(text) {
  return new Promise(resolve => {
    // Workaround: cancel first to avoid Chrome's ~15s auto-cancel bug
    speechSynthesis.cancel();

    const utt = new SpeechSynthesisUtterance(text);
    utt.lang  = 'en-GB';
    utt.rate  = 1.05;
    utt.pitch = 1.0;

    const voice = getSelectedVoice();
    if (voice) utt.voice = voice;

    utt.onend   = resolve;
    utt.onerror = (e) => { console.warn('SpeechSynthesis error', e); resolve(); };

    speechSynthesis.speak(utt);
  });
}

function stopCurrentAudio() {
  speechSynthesis.cancel();
}

/* Split narration text into sentences */
function splitSentences(text) {
  return text.match(/[^.!?]+[.!?]*/g)?.map(s => s.trim()).filter(Boolean) || [text];
}

/* Update the narration bar */
function setNarrationBar(sectionTitle, currentSentence) {
  document.getElementById('narration-bar').classList.add('visible');
  document.getElementById('nb-section-label').textContent = sectionTitle;
  document.getElementById('nb-subtitle').textContent = currentSentence || '…';
}

function hideNarrationBar() {
  document.getElementById('narration-bar').classList.remove('visible');
  document.querySelectorAll('.sc-play.active').forEach(b => {
    b.classList.remove('active');
    b.innerHTML = '&#9654;';
  });
}

/* Play a single section */
async function playSectionById(id) {
  stopRequested = false;
  stopCurrentAudio();

  const sec = GUIDE_SECTIONS.find(s => s.id === id);
  if (!sec) return;

  if (availableVoices.length === 0) await loadVoices();

  document.querySelectorAll('.sc-play').forEach(b => {
    b.classList.remove('active');
    b.innerHTML = '&#9654;';
  });
  const btn = document.querySelector(`.sc-play[data-id="${id}"]`);
  if (btn) { btn.classList.add('active'); btn.innerHTML = '&#9646;&#9646;'; }

  const sentences = splitSentences(sec.narration);

  for (const sentence of sentences) {
    if (stopRequested) break;
    setNarrationBar(sec.title, sentence);
    await speakSentence(sentence);
    if (!stopRequested) await sleep(90);
  }

  if (btn) { btn.classList.remove('active'); btn.innerHTML = '&#9654;'; }
  if (!stopRequested) hideNarrationBar();
}

/* Play all sections in sequence */
async function playAllSections() {
  stopRequested = false;

  for (const sec of GUIDE_SECTIONS) {
    if (stopRequested) break;
    document.getElementById(`section-${sec.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    await sleep(700);
    await playSectionById(sec.id);
    await sleep(700);
  }

  hideNarrationBar();
}

function stopNarration() {
  stopRequested = true;
  stopCurrentAudio();
  hideNarrationBar();
}

/* ================================================================
   SIDEBAR TOGGLE (mobile)
   ================================================================ */
window.toggleSidebar = function() {
  document.getElementById('sidebar').classList.toggle('open');
};
window.closeSidebar = function() {
  document.getElementById('sidebar').classList.remove('open');
};

/* Expose to global scope for onclick handlers */
window.playSectionById = playSectionById;
window.playAllSections = playAllSections;
window.stopNarration = stopNarration;

/* ================================================================
   INIT
   ================================================================ */
renderSections();
initScrollSpy();
populateVoiceSelect();

</script>
